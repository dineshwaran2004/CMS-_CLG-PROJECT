<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #2c3e50;
      color: #ecf0f1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .sidebar {
      width: 200px;
      height: 100vh;
      background-color: #dcdcdc;
      color: #333;
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .sidebar a {
      color: #333;
      text-decoration: none;
      padding: 15px 20px;
      display: block;
      border-bottom: 1px solid #bbb;
    }
    .sidebar a:hover {
      background-color: #ffcc00;
      color: #fff;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: calc(100% - 200px);
      height: 100vh;
      margin-left: 200px;
    }
    .login-box {
      background-color: #34495e;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      width: 350px;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .login-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background-color: #2c3e50;
      color: #ecf0f1;
    }
    .login-box button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .login-box button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Dinesh(cms)</h2>
    <a href="dashboard.html">Back</a>
  </div>

  <div class="login-container">
    <div class="login-box">
      <h2>Worker Verification</h2>
      <input type="text" id="workerId" placeholder="Enter Worker ID">
      <input type="text" id="verifyCode" placeholder="Enter Verify Code">
      <button onclick="verifyWorker()">Verify</button>
    </div>
  </div>

  <script>
    function verifyWorker() {
      const workerId = document.getElementById('workerId').value;
      const verifyCode = document.getElementById('verifyCode').value;
      
      if(workerId === '8778' && verifyCode === '7125') {
        alert('Verification Successful!');
        window.location.href = 'worker_dashboard.html';
      } else {
        alert('Invalid Worker ID or Verify Code');
      }
    }
  </script>
</body>
</html>
