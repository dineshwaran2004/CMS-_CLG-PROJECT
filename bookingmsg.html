<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://source.unsplash.com/1600x900/?event,party') no-repeat center center/cover;
            color: #333;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }
        
        .brand-name {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            z-index: 2;
        }
        
        .confirmation-box {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 450px;
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            animation: fadeIn 0.5s ease-out forwards;
            z-index: 2;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .checkmark {
            width: 90px;
            height: 90px;
            background: #7cd176;
            color: white;
            font-size: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%) scale(0.5);
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.3);
            animation: popUp 0.5s ease-out forwards 0.3s;
        }
        
        @keyframes popUp {
            from { transform: translateX(-50%) scale(0.5); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        
        h2 {
            font-size: 26px;
            margin-top: 50px;
            font-weight: bold;
            animation: slideIn 0.6s ease-out forwards 0.6s;
            opacity: 0;
        }
        
        p {
            font-size: 18px;
            margin: 15px 0;
            animation: slideIn 0.6s ease-out forwards 0.7s;
            opacity: 0;
        }
        
        .ok-button {
            background: #7cd176;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
            animation: slideIn 0.6s ease-out forwards 0.8s;
            opacity: 0;
        }
        
        .ok-button:hover {
            background: #66b362;
        }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
    <script>
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 5000);
    </script>
</head>
<body>
    <div class="brand-name">SmarT Event Management</div>
    <div class="confirmation-box">
        <div class="checkmark">✔</div>
        <h2>Awesome! Booking Confirmed!</h2>
        <p>Your booking has been confirmed.<br>Wait 5 minutes and the facility will call for details.</p>
        <button class="ok-button">OK</button>
    </div>
</body>
</html>
