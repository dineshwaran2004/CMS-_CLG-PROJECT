<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Mahal Decoration</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      font-weight: bold;
      background-color: #dcdcdc;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background-color: #808080;
      color: #ffffff;
      padding: 1.5em;
      font-size: 2.8em;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
    }
    .slider-container {
      position: relative;
      width: 55%;
      height: 400px;
      margin: 30px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.2);
    }
    .slider {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .slider img {
      min-width: 100%;
      height: 600px;
      object-fit: cover;
      border-radius: 15px;
    }
    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(255, 165, 0, 0.9);
      color: white;
      border: none;
      padding: 12px 18px;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s;
    }
    .nav-button:hover {
      background-color: rgba(255, 140, 0, 1);
    }
    .prev {
      left: 10px;
    }
    .next {
      right: 10px;
    }
    .description {
      font-size: 1.4em;
      font-weight: bold;
      margin: 20px auto;
      padding: 15px 25px;
      max-width: 800px;
      color: #ffffff;
      background-color: #808080;
      border-radius: 12px;
      box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.1);
    }
    footer {
      background-color: #505050;
      color: #ffeb3b;
      padding: 15px;
      font-weight: bold;
    }
    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #ffa500;
      color: white;
      padding: 5px 10px;
      font-size: 0.9em;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

<a href="index.html" class="back-button">Back</a>

<header>
    Bridal Makeup
</header>

<div class="slider-container">
  <div class="slider">
    <img src="m1.jpg" alt="Mahal View 1">
    <img src="m2.jpg" alt="Mahal View 2">
    <img src="m3.jpg" alt="Mahal View 3">
  </div>
  <button class="nav-button prev" onclick="prevSlide()">&#10094;</button>
  <button class="nav-button next" onclick="nextSlide()">&#10095;</button>
</div>

<div class="description">
  <p>Indian bridal makeup enhances beauty with bold eyes, vibrant lips, and a radiant glow. It includes traditional elements like a bindi and sindoor, reflecting cultural elegance.</p>
</div>

<footer>
  Dinesh Catering Management System
</footer>

<script>
  let currentIndex = 0;
  const slider = document.querySelector('.slider');
  const slides = document.querySelectorAll('.slider img');
  const totalSlides = slides.length;

  function showSlide(index) {
    if (index < 0) {
      currentIndex = totalSlides - 1;
    } else if (index >= totalSlides) {
      currentIndex = 0;
    } else {
      currentIndex = index;
    }
    const offset = -currentIndex * 100;
    slider.style.transform = `translateX(${offset}%)`;
  }

  function prevSlide() {
    showSlide(currentIndex - 1);
  }

  function nextSlide() {
    showSlide(currentIndex + 1);
  }
</script>

</body>
</html>
