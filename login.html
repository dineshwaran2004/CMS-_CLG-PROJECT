<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, rgb(255, 255, 255), rgb(255, 255, 255));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            width: 550px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h1 {
            font-size: 34px;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-size: 16px;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: rgb(196, 162, 29);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #4ea8de;
        }

        .social-login {
            margin-top: 20px;
            text-align: center;
            color: #888;
        }

        .social-login i {
            margin: 0 10px;
            font-size: 18px;
            cursor: pointer;
            color: #555;
            transition: color 0.3s ease;
        }

        .social-login i:hover {
            color: rgb(192, 167, 45);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .logo {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        .logo img {
            width: 60px;
        }
    </style>
    <a href="index.html" class="back-btn">Back</a>
    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form method="POST" action="login.php">
            <label for="username"><i class="fas fa-user"></i> User name</label>
            <input type="text" name="username" id="username" required>

            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">LOG IN NOW <i class="fas fa-arrow-right"></i></button>
        </form>
    </div>

    <div class="logo">
        <img src="LOGO.jpg" alt="DinesH Catering Logo">
    </div>
</body>
</html>
