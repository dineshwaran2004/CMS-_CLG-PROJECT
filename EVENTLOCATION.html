        body {

            flex-direction: column;
            align-items: center;

        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #dcdcdc;
            color: #333;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;

        }

        .sidebar a {
            color: #333;
            text-decoration: none;
            padding: 15px;
            display: block;
            border-bottom: 1px solid #bbb;
            text-align: center;
        }

        .sidebar a:hover {
            background-color: #ffcc00;
            color: #fff;
        }

        /* Main Content */
        .content {
            margin-left: 270px; /* Push content to the right to avoid overlapping with sidebar */
            width: calc(100% - 270px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* Title */
        .title {
            font-size: 2em;
            font-weight: bold;
            color: rgb(225, 190, 13);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Card Container */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;  /* Center horizontally */
            align-items: center;      /* Center vertically */
            gap: 20px;
            padding: 20px;
        }

        /* Card Design */
        .card {
    position: relative;
    width: 350px; /* Increased width for rectangle */
    height: 300px; /* Kept height same */
    border-radius: 15px;
    overflow: hidden;
    background: yellow;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}


        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
            transition: filter 0.3s ease;
        }

        .card:hover img {
            filter: brightness(1);
        }

        .card h4 {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2em;
            text-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .card:hover h4 {
            opacity: 1;
            transform: translateY(0);
        }

        /* Footer */
        footer {
            width: 100%;
            background-color: gray;
            color: rgb(229, 210, 9);
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }

        /* Logo */
        .logo {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }

        .logo img {
            width: 80px;
            height: auto;
        }
